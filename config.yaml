trading:
  mode: paper          # paper (live data, simulated trades) or live (real trades)
  leverage: 20          # 20x kaldıraç
  entry_percent: 0.5  # %10 = %0.5 * 20x
  stop_loss_percent: 2.0
  tp1_percent: 3.0    # First TP - 3%
  tp2_percent: 6.0    # Second TP - 6%
  take_profit_percent: 3.0
  trailing_stop_percent: 1.5
  max_positions: 5
  cooldown_minutes: 15
  entry_offset_percent: 0.2    # Entry offset from support/resistance
  entry_timeout_seconds: 30
  smc_option: 1        # SMC decision mode: 1=Liquidity+StopHunt, 2=OrderBlock+Liquidity, 3=Full Analysis