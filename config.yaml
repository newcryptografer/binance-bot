binance:
  api_key: ""          # Fill for both live and paper mode (required for live market data)
  api_secret: ""       # Fill for both live and paper mode
  # testnet removed - use mode in trading section instead

trading:
  mode: paper          # paper (live data, simulated trades) or live (real trades)
  leverage: 20          # 20x kaldıraç
  entry_percent: 0.5  # %10 = %0.5 * 20x
  stop_loss_percent: 2.0
  tp1_percent: 3.0    # First TP - 3%
  tp2_percent: 6.0    # Second TP - 6%
  take_profit_percent: 3.0
  trailing_stop_percent: 1.5
  max_positions: 5
  cooldown_minutes: 15
  entry_offset_percent: 0.2    # Entry offset from support/resistance
  entry_timeout_seconds: 30

scanning:
  interval_seconds: 300      # 5 minutes
  min_volume_usdt: 100000   # Minimum volume filter
  ohlcv_limit: 200          # Candles for analysis
  timeframe: 1h             # 1m, 5m, 15m, 1h, 4h

risk:
  max_daily_loss_percent: 5.0
  max_consecutive_losses: 3